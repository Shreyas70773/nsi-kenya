name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  check:
    name: Typecheck, lint, unit tests, build checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Convex codegen runs without auth — it reads convex/schema.ts and
      # convex/*.ts and writes convex/_generated/. The generated types are
      # required for tsc and next build.
      - name: Generate Convex types
        run: npx convex codegen

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npx eslint src

      - name: Unit tests
        run: npm run test:run

      - name: Build-pipeline checks
        run: |
          npm run check:alt-text
          npm run check:meta

  build:
    name: Production build (Next.js + Tailwind 4)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    if: vars.RUN_BUILD_JOB != 'false'

    env:
      # next build does not actually hit the Convex deployment, but it does
      # need NEXT_PUBLIC_CONVEX_URL inlined into the client bundle. A dummy
      # placeholder is fine for the build itself; replace with a real value
      # in Netlify env for actual deploys.
      NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL || 'https://placeholder.convex.cloud' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret-not-for-production' }}
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx convex codegen

      - name: Build
        run: npm run build

      - name: Cache .next
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            !.next/cache
          retention-days: 3

  e2e:
    name: Playwright smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    # Gated by repo variable so first-time setup does not red the build.
    # Set RUN_E2E to "true" in repo settings once NEXTAUTH_SECRET and
    # NEXT_PUBLIC_CONVEX_URL secrets are configured.
    if: vars.RUN_E2E == 'true'

    env:
      NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://127.0.0.1:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npx convex codegen

      - name: Build
        run: npm run build

      - name: Run Playwright smoke
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
